<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Sammle alle deutschen KFZ-Kennzeichen!">
  <title>Kennzeichen Sammeln</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('kz-theme');
        var theme = (stored === 'dark' || stored === 'light')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="app-header">
    <div class="header-back" id="header-back" style="display:none">
      <button class="btn-back" aria-label="Zurueck">&#8592;</button>
    </div>
    <h1 class="header-title">Kennzeichen Sammeln</h1>
    <button class="btn-dice" id="btn-dice" aria-label="Challenge öffnen">🎲</button>
    <button class="btn-theme" id="btn-theme" aria-label="Design wechseln">🌙</button>
  </header>

  <main id="app-content" class="app-content"></main>

  <nav class="bottom-nav" id="bottom-nav">
    <a href="#/list" class="nav-item" data-view="list">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>Liste</span>
    </a>
    <a href="#/map" class="nav-item" data-view="map">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
      <span>Karte</span>
    </a>
    <a href="#/stats" class="nav-item" data-view="stats">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="18" y="3" width="4" height="18" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="2" y="13" width="4" height="8" rx="1"/>
      </svg>
      <span>Statistik</span>
    </a>
    <a href="#/achievements" class="nav-item" data-view="achievements">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
        <path d="M6 9H4a2 2 0 0 1-2-2V5h4"/>
        <path d="M18 9h2a2 2 0 0 0 2-2V5h-4"/>
        <path d="M6 5h12v5a6 6 0 0 1-12 0V5z"/>
        <line x1="12" y1="15" x2="12" y2="19"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
      <span>Erfolge</span>
    </a>
  </nav>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        // Poll for updates every 60s while the app is open so deploys are picked up without closing the tab
        setInterval(() => reg.update().catch(() => {}), 60000);
      });
      let refreshing = false;
      function doReload() {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      }
      navigator.serviceWorker.addEventListener('controllerchange', doReload);
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'SW_UPDATED') doReload();
      });
    }
  </script>
</body>
</html>
